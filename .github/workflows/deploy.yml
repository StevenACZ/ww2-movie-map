name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ github.repository }}
      cancel-in-progress: true
    env:
      SSH_HOST: ${{ vars.SSH_HOST }}
      SSH_USER: ${{ vars.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ vars.SSH_PORT }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      SSH_KNOWN_HOSTS: ${{ vars.SSH_KNOWN_HOSTS }}
      PRODUCTION_URL: https://ww2.stevenacz.com
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Detect package manager
        id: pm
        run: |
          if [ -f package-lock.json ]; then
            echo "manager=npm" >> "$GITHUB_OUTPUT"
          elif [ -f bun.lock ] || [ -f bun.lockb ]; then
            echo "manager=bun" >> "$GITHUB_OUTPUT"
          else
            echo "No supported lockfile found (package-lock.json, bun.lock, bun.lockb)."
            exit 1
          fi

      - name: Install dependencies
        run: |
          if [ "${{ steps.pm.outputs.manager }}" = "npm" ]; then
            npm ci
          else
            bun install --frozen-lockfile || bun install
          fi

      - name: Format check
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s['format:check'] ? 0 : 1)"; then
            if [ "${{ steps.pm.outputs.manager }}" = "npm" ]; then
              npm run format:check
            else
              bun run format:check
            fi
          else
            echo "No format:check script found. Skipping."
          fi

      - name: Lint
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.lint ? 0 : 1)"; then
            if [ "${{ steps.pm.outputs.manager }}" = "npm" ]; then
              npm run lint
            else
              bun run lint
            fi
          else
            echo "No lint script found. Skipping."
          fi

      - name: Typecheck
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.typecheck ? 0 : 1)"; then
            if [ "${{ steps.pm.outputs.manager }}" = "npm" ]; then
              npm run typecheck
            else
              bun run typecheck
            fi
          else
            echo "No typecheck script found. Skipping."
          fi

      - name: Dependency audit
        run: |
          if [ "${{ steps.pm.outputs.manager }}" = "npm" ]; then
            npm audit --audit-level=high
          else
            bun audit
          fi

      - name: Tests
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s['test:run'] ? 0 : 1)"; then
            if [ "${{ steps.pm.outputs.manager }}" = "npm" ]; then
              npm run test:run
            else
              bun run test:run
            fi
          else
            echo "No test:run script found. Skipping."
          fi

      - name: Build
        id: build
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.generate ? 0 : 1)"; then
            if [ "${{ steps.pm.outputs.manager }}" = "npm" ]; then
              npm run generate
            else
              bun run generate
            fi
          else
            if [ "${{ steps.pm.outputs.manager }}" = "npm" ]; then
              npm run build
            else
              bun run build
            fi
          fi

          if [ -f .output/public/public/index.html ]; then
            echo "output_dir=.output/public/public" >> "$GITHUB_OUTPUT"
          elif [ -f .output/public/index.html ] || [ -d .output/public/_nuxt ]; then
            echo "output_dir=.output/public" >> "$GITHUB_OUTPUT"
          elif [ -f dist/public/index.html ]; then
            echo "output_dir=dist/public" >> "$GITHUB_OUTPUT"
          elif [ -d dist ]; then
            echo "output_dir=dist" >> "$GITHUB_OUTPUT"
          else
            echo "Build output not found (.output/public/public, .output/public, dist/public or dist)."
            exit 1
          fi

      - name: Validate deployment configuration
        id: deploy_config
        run: |
          ready=true

          if [ -z "$SSH_HOST" ]; then
            echo "Missing variable: SSH_HOST"
            ready=false
          fi
          if [ -z "$SSH_USER" ]; then
            echo "Missing variable: SSH_USER"
            ready=false
          fi
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "Missing secret: SSH_PRIVATE_KEY"
            ready=false
          fi
          if [ -z "$DEPLOY_PATH" ]; then
            echo "Missing variable: DEPLOY_PATH"
            ready=false
          fi
          if [ "$DEPLOY_PATH" = "/" ]; then
            echo "DEPLOY_PATH cannot be /."
            exit 1
          fi
          case "$DEPLOY_PATH" in
            /home/steven/applications/*) : ;;
            *) echo "DEPLOY_PATH must be under /home/steven/applications/"; exit 1 ;;
          esac
          case "$DEPLOY_PATH" in
            *..*) echo "DEPLOY_PATH must not contain '..'"; exit 1 ;;
          esac

          echo "ready=$ready" >> "$GITHUB_OUTPUT"

      - name: Setup SSH key
        if: steps.deploy_config.outputs.ready == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          port="${SSH_PORT:-22}"
          : "${SSH_KNOWN_HOSTS:?Set SSH_KNOWN_HOSTS repo variable}"
          echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to VPS via rsync
        if: steps.deploy_config.outputs.ready == 'true'
        run: |
          port="${SSH_PORT:-22}"
          output_dir="${{ steps.build.outputs.output_dir }}"

          ssh -i ~/.ssh/deploy_key -p "$port" "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_PATH'"

          rsync -avz --delete --chmod=D755,F644 \
            -e "ssh -i ~/.ssh/deploy_key -p $port" \
            "$output_dir/" \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Validate deployed site
        if: steps.deploy_config.outputs.ready == 'true'
        run: |
          curl -fsSL "$PRODUCTION_URL" > /tmp/live.html
          if ! grep -q "WW2 Film Map" /tmp/live.html; then
            echo "Live site validation failed after deploy."
            exit 1
          fi

      - name: Deployment skipped
        if: steps.deploy_config.outputs.ready != 'true'
        run: |
          echo "Build completed. Configure SSH_HOST, SSH_USER, SSH_PORT, DEPLOY_PATH, and SSH_PRIVATE_KEY to enable rsync deploys."
